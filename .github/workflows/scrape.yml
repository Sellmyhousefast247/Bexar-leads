name: Bexar County Lead Scraper

on:
  schedule:
    # Run daily at 7:00 AM CST (13:00 UTC)
    - cron: "0 13 * * *"
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Number of days to look back"
        required: false
        default: "7"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 lxml dbfread playwright

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Create output directories
        run: |
          mkdir -p dashboard data

      - name: Run scraper
      - name: Run XLeads pipeline
        run: python scraper/pipeline.py
        env:
          PYTHONUNBUFFERED: "1"
          XLEADS_EMAIL:    ${{ secrets.XLEADS_EMAIL }}
          XLEADS_PASSWORD: ${{ secrets.XLEADS_PASSWORD }}
          MIN_SCORE:       "40"
        continue-on-error: true

      - name: Update admin stats
        run: python scraper/admin_panel.py
        continue-on-error: true
        run: |
          python scraper/fetch.py --days ${{ github.event.inputs.lookback_days || '7' }}
        env:
          PYTHONUNBUFFERED: "1"

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/records.json data/records.json data/ghl_export.csv
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          git diff --staged --quiet || git commit -m "Scrape results: ${TIMESTAMP}"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-dashboard:
    needs: scrape
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest changes
        run: git pull origin main

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dashboard
          keep_files: true
