name: Bexar County Lead Scraper

on:
  schedule:
    - cron: "0 13 * * 1-6"
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Days to look back"
        default: "7"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 lxml dbfread playwright

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Create directories
        run: mkdir -p dashboard data state exports/xleads imports/xleads logs archive

      - name: Run county scraper
        run: python scraper/fetch.py --days ${{ github.event.inputs.lookback_days || '7' }}
        env:
          PYTHONUNBUFFERED: "1"

      - name: Run XLeads pipeline
        run: python scraper/pipeline.py
        env:
          PYTHONUNBUFFERED: "1"
          XLEADS_EMAIL:    ${{ secrets.XLEADS_EMAIL }}
          XLEADS_PASSWORD: ${{ secrets.XLEADS_PASSWORD }}
          GHL_API_KEY:     ${{ secrets.GHL_API_KEY }}
          GHL_LOCATION_ID: "47v58a5xVmpgOdpajnj7"
          MIN_SCORE:       "40"
        continue-on-error: true

      - name: Update admin stats
        run: python scraper/admin_panel.py
        continue-on-error: true

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/ data/ state/ logs/ exports/ imports/ || true
          git diff --staged --quiet || git commit -m "Daily update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-dashboard:
    needs: scrape
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest changes
        run: git pull origin main

      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dashboard
          keep_files: true
