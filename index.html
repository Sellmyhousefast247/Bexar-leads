<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Bexar Leads - Sell My House Fast 247</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0a0c10;--sur:#111318;--sur2:#181c23;--bor:#1e2330;--acc:#e8b84b;--txt:#e8ecf2;--mut:#6b7485;--grn:#4cd976;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--txt);font-family:sans-serif;font-size:14px;min-height:100vh;}
header{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-bottom:1px solid var(--bor);background:var(--sur);position:sticky;top:0;z-index:100;}
.logo{font-family:serif;font-size:22px;letter-spacing:2px;color:var(--acc);font-weight:bold;}
.logo span{color:var(--txt);}
.hmeta{display:flex;align-items:center;gap:20px;font-size:12px;color:var(--mut);}
.dotlive{width:8px;height:8px;border-radius:50%;background:var(--grn);display:inline-block;box-shadow:0 0 8px var(--grn);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.shell{display:grid;grid-template-columns:240px 1fr;min-height:calc(100vh - 57px);}
aside{background:var(--sur);border-right:1px solid var(--bor);padding:20px 14px;display:flex;flex-direction:column;gap:24px;}
.statblk{background:var(--sur2);border:1px solid var(--bor);border-radius:10px;padding:16px;}
.statlbl{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--mut);margin-bottom:8px;}
.statbig{font-size:42px;color:var(--acc);line-height:1;font-weight:bold;}
.statsub{font-size:11px;color:var(--mut);margin-top:4px;}
.sectitle{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--mut);margin-bottom:8px;}
.fgroup{display:flex;flex-direction:column;gap:5px;}
.fbtn{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:7px;border:1px solid transparent;background:transparent;color:var(--mut);cursor:pointer;font-size:12px;width:100%;text-align:left;}
.fbtn:hover,.fbtn.active{background:var(--sur2);border-color:var(--bor);color:var(--txt);}
.fdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-right:8px;display:inline-block;}
.fbadge{font-size:11px;color:var(--mut);}
.flabel{display:flex;align-items:center;}
.scoresec label{display:block;font-size:12px;color:var(--mut);margin-bottom:6px;}
.scoresec input[type=range]{width:100%;accent-color:var(--acc);}
.scorevals{display:flex;justify-content:space-between;font-size:11px;color:var(--mut);margin-top:3px;}
main{display:flex;flex-direction:column;}
.toolbar{display:flex;align-items:center;gap:10px;padding:14px 20px;border-bottom:1px solid var(--bor);background:var(--sur);position:sticky;top:57px;z-index:50;flex-wrap:wrap;}
.swrap{flex:1;min-width:180px;position:relative;}
.swrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--mut);pointer-events:none;}
.swrap input{width:100%;background:var(--sur2);border:1px solid var(--bor);border-radius:8px;padding:8px 10px 8px 32px;color:var(--txt);font-size:13px;outline:none;}
.swrap input:focus{border-color:var(--acc);}
.swrap input::placeholder{color:var(--mut);}
select.ssort{background:var(--sur2);border:1px solid var(--bor);border-radius:8px;padding:8px 10px;color:var(--txt);font-size:13px;cursor:pointer;outline:none;}
.rcount{font-size:12px;color:var(--mut);white-space:nowrap;}
.expbtn{background:var(--acc);color:#000;font-weight:600;font-size:12px;border:none;border-radius:7px;padding:8px 14px;cursor:pointer;}
.expbtn:hover{opacity:.85;}
.twrap{flex:1;overflow-x:auto;padding:18px 20px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{text-align:left;padding:9px 12px;font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--mut);border-bottom:1px solid var(--bor);white-space:nowrap;}
tbody tr{border-bottom:1px solid var(--bor);cursor:pointer;}
tbody tr:hover{background:var(--sur2);}
tbody td{padding:11px 12px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:middle;}
.spill{display:inline-flex;align-items:center;justify-content:center;width:36px;height:22px;border-radius:5px;font-size:12px;}
.shi{background:#4cd97622;color:var(--grn);border:1px solid #4cd97644;}
.smi{background:#e8b84b22;color:var(--acc);border:1px solid #e8b84b44;}
.slo{background:#6b748522;color:var(--mut);border:1px solid #6b748544;}
.ctag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;white-space:nowrap;}
.fchip{display:inline-block;padding:2px 5px;border-radius:3px;font-size:10px;background:#ffffff0d;color:var(--mut);}
.statebox{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:14px;color:var(--mut);}
.statebox h3{color:var(--txt);font-size:16px;font-weight:500;}
.statebox p{font-size:13px;text-align:center;max-width:340px;line-height:1.6;}
.spinner{width:30px;height:30px;border:3px solid var(--bor);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.pgn{display:flex;align-items:center;justify-content:center;gap:7px;padding:18px 20px;border-top:1px solid var(--bor);}
.pgbtn{background:var(--sur2);border:1px solid var(--bor);color:var(--txt);border-radius:7px;padding:6px 12px;cursor:pointer;font-size:12px;}
.pgbtn:hover:not(:disabled){border-color:var(--acc);color:var(--acc);}
.pgbtn:disabled{opacity:.3;cursor:default;}
.pgbtn.on{background:var(--acc);color:#000;border-color:var(--acc);}
.pginfo{font-size:11px;color:var(--mut);}
.overlay{position:fixed;inset:0;background:#00000088;z-index:200;display:none;}
.overlay.open{display:block;}
.drawer{position:fixed;top:0;right:0;bottom:0;width:400px;background:var(--sur);border-left:1px solid var(--bor);z-index:201;transform:translateX(100%);transition:transform .25s;display:flex;flex-direction:column;overflow-y:auto;}
.drawer.open{transform:translateX(0);}
.drh{padding:18px 20px 14px;border-bottom:1px solid var(--bor);display:flex;justify-content:space-between;gap:10px;position:sticky;top:0;background:var(--sur);}
.drtitle{font-size:20px;color:var(--acc);font-weight:bold;}
.drsub{font-size:12px;color:var(--mut);margin-top:3px;}
.drclose{background:none;border:none;color:var(--mut);cursor:pointer;font-size:22px;line-height:1;}
.drbody{padding:18px 20px;flex:1;display:flex;flex-direction:column;gap:16px;}
.dsec{background:var(--sur2);border:1px solid var(--bor);border-radius:10px;padding:12px 14px;}
.dsect{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--mut);margin-bottom:8px;}
.drow{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;padding:6px 0;border-bottom:1px solid var(--bor);}
.drow:last-child{border-bottom:none;}
.dkey{color:var(--mut);font-size:12px;flex-shrink:0;}
.dval{color:var(--txt);font-size:12px;text-align:right;word-break:break-word;}
.dract{display:flex;gap:8px;flex-wrap:wrap;padding:14px 20px;border-top:1px solid var(--bor);background:var(--sur);position:sticky;bottom:0;}
.abtn{flex:1;padding:9px;border-radius:8px;border:1px solid var(--bor);background:var(--sur2);color:var(--txt);font-size:12px;cursor:pointer;text-align:center;text-decoration:none;}
.abtn:hover{border-color:var(--acc);color:var(--acc);}
.abtn.pri{background:var(--acc);color:#000;border-color:var(--acc);}
@media(max-width:860px){.shell{grid-template-columns:1fr;}aside{display:none;}.drawer{width:100%;}}
</style>
</head>
<body>
<header>
  <div class="logo">BEXAR <span>LEADS</span></div>
  <div class="hmeta">
    <span><span class="dotlive"></span> LIVE</span>
    <span id="hdr-range">-</span>
    <span id="hdr-fetched">-</span>
  </div>
</header>
<div class="shell">
  <aside>
    <div class="statblk">
      <div class="statlbl">Total Leads</div>
      <div class="statbig" id="stat-total">-</div>
      <div class="statsub" id="stat-addr">- with address</div>
    </div>
    <div>
      <div class="sectitle">Lead Type</div>
      <div class="fgroup" id="cat-filters"></div>
    </div>
    <div class="scoresec">
      <div class="sectitle">Min Score</div>
      <label>Score &ge; <span id="score-val">0</span></label>
      <input type="range" min="0" max="100" value="0" id="score-range" oninput="setScore(this.value)"/>
      <div class="scorevals"><span>0</span><span>50</span><span>100</span></div>
    </div>
    <div>
      <div class="sectitle">Date Range</div>
      <div style="display:flex;flex-direction:column;gap:6px;">
        <input type="date" id="date-from" onchange="applyFilters()" style="background:var(--sur2);border:1px solid var(--bor);border-radius:7px;padding:7px 9px;color:var(--txt);font-size:12px;outline:none;width:100%;"/>
        <input type="date" id="date-to" onchange="applyFilters()" style="background:var(--sur2);border:1px solid var(--bor);border-radius:7px;padding:7px 9px;color:var(--txt);font-size:12px;outline:none;width:100%;"/>
      </div>
    </div>
  </aside>
  <main>
    <div class="toolbar">
      <div class="swrap">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="search-input" placeholder="Search owner, address, doc..." oninput="applyFilters()"/>
      </div>
      <select class="ssort" id="sort-sel" onchange="applyFilters()">
        <option value="score_desc">Score High-Low</option>
        <option value="score_asc">Score Low-High</option>
        <option value="date_desc">Date Newest</option>
        <option value="date_asc">Date Oldest</option>
        <option value="amount_desc">Amount High-Low</option>
      </select>
      <span class="rcount" id="rcount">- leads</span>
      <button class="expbtn" onclick="exportCSV()">Export CSV</button>
    </div>
    <div class="twrap" id="tarea"><div class="statebox"><div class="spinner"></div><h3>Loading leads...</h3></div></div>
    <div class="pgn" id="pgn" style="display:none"></div>
  </main>
</div>
<div class="overlay" id="overlay" onclick="closeDr()"></div>
<div class="drawer" id="drawer">
  <div class="drh">
    <div><div class="drtitle" id="dr-owner">-</div><div class="drsub" id="dr-doc">-</div></div>
    <button class="drclose" onclick="closeDr()">&#x2715;</button>
  </div>
  <div class="drbody" id="dr-body"></div>
  <div class="dract" id="dr-act"></div>
</div>
<script>
var allR=[],filt=[],aCat='ALL',minSc=0,sQ='',sKey='score_desc',pg=1,PS=50;
var CATS={LP:{l:'Lis Pendens',c:'#e8b84b'},FC:{l:'Foreclosure',c:'#f04f4f'},JUD:{l:'Judgment',c:'#b88ef7'},LIEN:{l:'Lien',c:'#4fafea'},PRO:{l:'Probate',c:'#4cd976'},OTHER:{l:'Other',c:'#6b7485'}};
function cc(c){return CATS[c]?CATS[c].c:'#6b7485';}
function cl(c){return CATS[c]?CATS[c].l:c;}
function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}
function sc(s){return s>=70?'shi':s>=40?'smi':'slo';}

function loadData(){
  fetch('./records.json')
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
    .then(function(j){
      allR=j.records||[];
      var el;
      el=document.getElementById('hdr-fetched');if(el&&j.fetched_at)el.textContent='Updated '+new Date(j.fetched_at).toLocaleString();
      el=document.getElementById('hdr-range');if(el&&j.date_range)el.textContent=j.date_range.start+' to '+j.date_range.end;
      el=document.getElementById('stat-total');if(el)el.textContent=(j.total!=null?j.total:allR.length);
      el=document.getElementById('stat-addr');if(el)el.textContent=(j.with_address!=null?j.with_address:0)+' with address';
      buildCats();applyFilters();
    })
    .catch(function(e){
      var a=document.getElementById('tarea');
      if(a)a.innerHTML='<div class="statebox"><h3>Error loading leads</h3><p>'+esc(e.message)+'</p></div>';
    });
}

function buildCats(){
  var counts={ALL:allR.length};
  allR.forEach(function(r){var c=r.cat||'OTHER';counts[c]=(counts[c]||0)+1;});
  var w=document.getElementById('cat-filters');if(!w)return;
  w.innerHTML='';
  ['ALL','LP','FC','JUD','LIEN','PRO','OTHER'].forEach(function(cat){
    if(cat!=='ALL'&&!counts[cat])return;
    var col=cat==='ALL'?'#e8b84b':cc(cat);
    var lbl=cat==='ALL'?'All Types':cl(cat);
    var b=document.createElement('button');
    b.className='fbtn'+(cat===aCat?' active':'');
    b.onclick=(function(c,btn){return function(){setCat(c,btn);};})(cat,b);
    b.innerHTML='<div class="flabel"><span class="fdot" style="background:'+col+'"></span>'+lbl+'</div><span class="fbadge">'+(counts[cat]||0)+'</span>';
    w.appendChild(b);
  });
}

function setCat(cat,btn){
  aCat=cat;
  var btns=document.querySelectorAll('.fbtn');
  for(var i=0;i<btns.length;i++)btns[i].classList.remove('active');
  if(btn)btn.classList.add('active');
  pg=1;applyFilters();
}

function setScore(v){
  minSc=parseInt(v)||0;
  var sv=document.getElementById('score-val');if(sv)sv.textContent=v;
  pg=1;applyFilters();
}

function applyFilters(){
  var si=document.getElementById('search-input');sQ=si?si.value.toLowerCase():'';
  var ss=document.getElementById('sort-sel');sKey=ss?ss.value:'score_desc';
  var df=document.getElementById('date-from'),dt=document.getElementById('date-to');
  var dfv=df?df.value:'',dtv=dt?dt.value:'';
  filt=allR.filter(function(r){
    if(aCat!=='ALL'&&(r.cat||'OTHER')!==aCat)return false;
    if((r.score||0)<minSc)return false;
    if(dfv&&r.filed&&r.filed<dfv)return false;
    if(dtv&&r.filed&&r.filed>dtv)return false;
    if(sQ){var h=[r.owner,r.grantee,r.prop_address,r.doc_num,r.doc_type,r.legal].join(' ').toLowerCase();if(h.indexOf(sQ)<0)return false;}
    return true;
  });
  filt.sort(function(a,b){
    if(sKey==='score_desc')return(b.score||0)-(a.score||0);
    if(sKey==='score_asc')return(a.score||0)-(b.score||0);
    if(sKey==='date_desc')return(b.filed||'')>(a.filed||'')?1:-1;
    if(sKey==='date_asc')return(a.filed||'')>(b.filed||'')?1:-1;
    return(b.amount||0)-(a.amount||0);
  });
  var rc=document.getElementById('rcount');if(rc)rc.textContent=filt.length+' leads';
  renderTable();renderPgn();
}

function renderTable(){
  var area=document.getElementById('tarea');if(!area)return;
  var start=(pg-1)*PS,rows=filt.slice(start,start+PS);
  if(!allR.length){area.innerHTML='<div class="statebox"><h3>No leads yet</h3><p>Wait for the daily 7 AM scrape or trigger the GitHub Action manually.</p></div>';return;}
  if(!rows.length){area.innerHTML='<div class="statebox"><h3>No matches</h3><p>Try adjusting your filters.</p></div>';return;}
  var h='<table><thead><tr><th>Score</th><th>Type</th><th>Filed</th><th>Owner</th><th>Address</th><th>Amount</th><th>Doc #</th></tr></thead><tbody>';
  for(var i=0;i<rows.length;i++){
    var r=rows[i],s=r.score||0,cat=r.cat||'OTHER',col=cc(cat);
    h+='<tr onclick="openDr('+(start+i)+')">';
    h+='<td><span class="spill '+sc(s)+'">'+s+'</span></td>';
    h+='<td><span class="ctag" style="background:'+col+'22;color:'+col+';border:1px solid '+col+'44;">'+cl(cat)+'</span></td>';
    h+='<td>'+esc(r.filed||'-')+'</td>';
    h+='<td title="'+esc(r.owner)+'">'+esc(r.owner||'-')+'</td>';
    h+='<td title="'+esc(r.prop_address)+'">'+esc(r.prop_address||'')+'</td>';
    h+='<td>'+(r.amount?'$'+Number(r.amount).toLocaleString():'-')+'</td>';
    h+='<td>'+esc(r.doc_num||'-')+'</td>';
    h+='</tr>';
  }
  h+='</tbody></table>';
  area.innerHTML=h;
}

function renderPgn(){
  var total=filt.length,tp=Math.ceil(total/PS),w=document.getElementById('pgn');if(!w)return;
  if(tp<=1){w.style.display='none';return;}
  w.style.display='flex';
  var h='<button class="pgbtn" onclick="goPg('+(pg-1)+')" '+(pg===1?'disabled':'')+'>Prev</button>';
  for(var p=Math.max(1,pg-2);p<=Math.min(tp,pg+2);p++)h+='<button class="pgbtn'+(p===pg?' on':'')+'" onclick="goPg('+p+')">'+p+'</button>';
  h+='<button class="pgbtn" onclick="goPg('+(pg+1)+')" '+(pg===tp?'disabled':'')+'>Next</button><span class="pginfo">'+((pg-1)*PS+1)+'-'+Math.min(pg*PS,total)+' of '+total+'</span>';
  w.innerHTML=h;
}

function goPg(p){pg=p;renderTable();renderPgn();}

function openDr(idx){
  var r=filt[idx];if(!r)return;
  var el;
  el=document.getElementById('dr-owner');if(el)el.textContent=r.owner||r.grantee||'Unknown';
  el=document.getElementById('dr-doc');if(el)el.textContent=r.doc_num?'Doc #'+r.doc_num:'';
  var s=r.score||0,cat=r.cat||'OTHER',col=cc(cat);
  var flags=(r.flags||[]).map(function(f){return '<span class="fchip">'+f.replace(/_/g,' ')+'</span>';}).join(' ');
  var body=document.getElementById('dr-body');if(!body)return;
  body.innerHTML=
    '<div class="dsec"><div class="dsect">Score</div>'
    +'<div style="display:flex;align-items:center;gap:10px;"><span class="spill '+sc(s)+'" style="width:48px;height:28px;font-size:16px;">'+s+'</span><span style="color:var(--mut);font-size:12px;">out of 100</span></div>'
    +(flags?'<div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:5px;">'+flags+'</div>':'')
    +'</div>'
    +'<div class="dsec"><div class="dsect">Document</div>'
    +'<div class="drow"><span class="dkey">Type</span><span class="dval">'+esc(r.cat_label||r.doc_type||'-')+'</span></div>'
    +'<div class="drow"><span class="dkey">Filed</span><span class="dval">'+esc(r.filed||'-')+'</span></div>'
    +'<div class="drow"><span class="dkey">Doc #</span><span class="dval">'+esc(r.doc_num||'-')+'</span></div>'
    +'<div class="drow"><span class="dkey">Amount</span><span class="dval">'+(r.amount?'$'+Number(r.amount).toLocaleString():'-')+'</span></div>'
    +'</div>'
    +'<div class="dsec"><div class="dsect">Parties</div>'
    +'<div class="drow"><span class="dkey">Owner</span><span class="dval">'+esc(r.owner||'-')+'</span></div>'
    +'<div class="drow"><span class="dkey">Grantee</span><span class="dval">'+esc(r.grantee||'-')+'</span></div>'
    +'</div>'
    +'<div class="dsec"><div class="dsect">Property</div>'
    +'<div class="drow"><span class="dkey">Address</span><span class="dval">'+esc(r.prop_address||'-')+'</span></div>'
    +'<div class="drow"><span class="dkey">City</span><span class="dval">'+esc((r.prop_city||'')+(r.prop_zip?' '+r.prop_zip:''))+'</span></div>'
    +'<div class="drow"><span class="dkey">Legal</span><span class="dval" style="font-size:11px;">'+esc(r.legal||'-')+'</span></div>'
    +'</div>'
    +'<div class="dsec"><div class="dsect">Mailing</div>'
    +'<div class="drow"><span class="dkey">Address</span><span class="dval">'+esc(r.mail_address||'-')+'</span></div>'
    +'<div class="drow"><span class="dkey">City</span><span class="dval">'+esc((r.mail_city||'')+(r.mail_zip?' '+r.mail_zip:''))+'</span></div>'
    +'</div>';
  var acts=document.getElementById('dr-act');if(!acts)return;
  acts.innerHTML='';
  if(r.clerk_url){var a=document.createElement('a');a.href=r.clerk_url;a.target='_blank';a.rel='noopener';a.className='abtn';a.textContent='Clerk Record';acts.appendChild(a);}
  if(r.prop_address){var q=encodeURIComponent(r.prop_address+' '+(r.prop_city||'')+' TX');var ma=document.createElement('a');ma.href='https://maps.google.com/?q='+q;ma.target='_blank';ma.rel='noopener';ma.className='abtn';ma.textContent='Map';acts.appendChild(ma);}
  var cb=document.createElement('button');cb.className='abtn pri';cb.textContent='Copy Lead';
  cb.onclick=function(){
    var lines=['Owner: '+(r.owner||'-'),'Type: '+(r.cat_label||r.doc_type||'-'),'Filed: '+(r.filed||'-'),'Amount: '+(r.amount?'$'+Number(r.amount).toLocaleString():'-'),'Address: '+(r.prop_address||'-')+' '+(r.prop_city||''),'Score: '+(r.score||0)];
    if(r.clerk_url)lines.push('Clerk: '+r.clerk_url);
    navigator.clipboard.writeText(lines.join('\n')).then(function(){cb.textContent='Copied!';setTimeout(function(){cb.textContent='Copy Lead';},1800);});
  };
  acts.appendChild(cb);
  el=document.getElementById('overlay');if(el)el.classList.add('open');
  el=document.getElementById('drawer');if(el)el.classList.add('open');
}

function closeDr(){
  var el=document.getElementById('overlay');if(el)el.classList.remove('open');
  el=document.getElementById('drawer');if(el)el.classList.remove('open');
}

document.addEventListener('keydown',function(e){if(e.key==='Escape')closeDr();});

function exportCSV(){
  var cols=['doc_num','doc_type','cat','cat_label','filed','owner','grantee','amount','prop_address','prop_city','prop_state','prop_zip','mail_address','mail_city','mail_state','mail_zip','legal','clerk_url','score','flags'];
  var rows=filt.map(function(r){return cols.map(function(c){var v=c==='flags'?(r.flags||[]).join('|'):(r[c]!=null?r[c]:'');return '"'+String(v).replace(/"/g,'""')+'"';}).join(',');});
  var blob=new Blob([cols.join(',')+'\n'+rows.join('\n')],{type:'text/csv'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='bexar-leads-'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}

loadData();
